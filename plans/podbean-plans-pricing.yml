specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Podbean
providerId: podbean
created: '2026-07-05'
modified: '2026-07-05'
reconciled: false
tags:
- Podcasting
- Podcast Hosting
- Media
- Plans
- Pricing
description: >-
  Podbean is priced as a podcast hosting SaaS with subscription tiers, not as a
  metered API product. The public API is available to developers on the platform
  and is not billed separately - API access rides on the account's hosting plan.
  Podbean publishes a free Basic plan plus four paid tiers (Unlimited Audio,
  Unlimited Plus, Network, Business), each available at a lower annual rate.
  Prices below are the published monthly and annual-effective monthly rates in
  USD as of the review date.
notes: >-
  Podbean also sells enterprise/agency solutions and add-ons (extra AI credits,
  premium bandwidth, ads marketplace) that are not itemized here. Verify current
  prices and limits on the Podbean pricing page during reconciliation.
sources:
- https://www.podbean.com/podcast-hosting-pricing
- https://developers.podbean.com/
- https://developers.podbean.com/podbean-api-docs/
plans:
- id: podbean-basic
  name: Basic
  type: free
  description: >-
    Free plan for getting started - roughly five hours of total audio storage
    with a monthly bandwidth allowance. Suitable for evaluating the platform.
  entries:
  - label: Monthly Price
    name: basic_price
    type: flat
    metric: subscription
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: $0
    userMultiplied: false
  elements:
  - name: 5 Hours Storage
  - name: Monthly Bandwidth Allowance
  - name: Basic Stats
  - name: Public API Access
- id: podbean-unlimited-audio
  name: Unlimited Audio
  type: paid
  description: >-
    Audio-only creator plan with unlimited total storage and unmetered
    bandwidth, advanced podcast stats, custom podcast site, ads marketplace,
    one-click distribution, and monthly AI credits.
