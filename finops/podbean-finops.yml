description: >-
  FinOps view of Podbean spend. Podbean bills as a podcast hosting SaaS on a
  fixed monthly (or discounted annual) subscription per plan tier - Basic (free),
  Unlimited Audio, Unlimited Plus, Network, and Business - rather than on metered
  API usage. The public API does not carry a separate line item; it rides on the
  account's hosting subscription. Cost drivers are therefore the chosen plan
  tier, the number of shows/networks, add-ons (extra AI credits, premium
  bandwidth, ads marketplace), and enterprise/agency agreements - not per-call
  API charges.
notes: >-
  Because pricing is subscription-based, the primary FinOps levers are picking
  the right tier, consolidating shows under Network/Business where cheaper per
  show, and committing annually for the discount. Verify current rates and
  add-ons on the Podbean pricing page.
