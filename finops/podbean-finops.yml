meters:
- name: plan_subscription
  description: Recurring monthly or annual subscription for the chosen Podbean plan tier.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: upload_volume
  description: Media uploaded per month against the plan's upload allowance; overage may push a tier upgrade.
  unit: bytes
  aggregation: sum
  dimensions:
  - account
  - podcast
- name: ai_credits
  description: Monthly AI credits included per tier; additional credits are an add-on cost.
  unit: credits
  aggregation: sum
  dimensions:
  - account
- name: shows
  description: Number of podcasts/shows hosted, relevant to Network/Business per-show economics.
  unit: shows
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Track the active plan tier, number of shows, monthly upload volume, and any add-on charges against the subscription.
- name: Allocation
  description: Attribute the subscription and per-show costs to the team or brand that owns each podcast, especially on Network/Business tiers.
- name: Optimization
  description: Choose the lowest tier that meets storage/bandwidth needs, consolidate multiple shows under Network/Business where cheaper per show, and commit annually for the discount.
- name: Accountability
  description: Review the subscription and add-ons each renewal cycle; confirm the tier still matches actual upload volume and show count.
